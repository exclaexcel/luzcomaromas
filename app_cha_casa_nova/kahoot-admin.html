<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎮 Admin — Kahoot Casa Nova</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --ouro: #B8956A;
  --ouro-escuro: #a07d54;
  --bege: #F5F1E8;
  --bege-escuro: #ede8dc;
  --texto: #5C4A3D;
  --texto-claro: #8B7355;
  --cor-a: #c0392b;
  --cor-b: #2471a3;
  --cor-c: #b7770d;
  --cor-d: #1e8449;
  --cor-v: #1e8449;
  --cor-m: #c0392b;
}

html, body {
  min-height: 100%;
  font-family: 'Georgia', serif;
  background: var(--bege);
  color: var(--texto);
}

body { padding-bottom: 100px; }

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: linear-gradient(135deg, var(--ouro) 0%, var(--ouro-escuro) 100%);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  box-shadow: 0 3px 12px rgba(184,149,106,0.3);
}
.header-titulo { font-size: 16px; font-weight: bold; color: white; }
.header-estado {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.estado-aguardando { background: rgba(255,255,255,0.25); color: white; }
.estado-pergunta   { background: #2471a3; color: white; }
.estado-fechado    { background: #6c3483; color: white; }
.estado-revelado   { background: #1e8449; color: white; }
.estado-placar     { background: white; color: var(--ouro-escuro); }

.jogadores-count {
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
}

/* ── SEÇÕES ── */
.secao { padding: 14px 16px; }

/* ── SELETOR DE BLOCO ── */
.bloco-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.bloco-btn {
  padding: 8px 12px;
  background: white;
  border: 2px solid #d4c4b0;
  border-radius: 8px;
  color: var(--texto-claro);
  font-family: 'Georgia', serif;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.bloco-btn.ativo { background: var(--ouro); border-color: var(--ouro); color: white; }

/* ── CARD PERGUNTA ── */
.card-pergunta {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
  border: 2px solid #e0d4c0;
  box-shadow: 0 3px 12px rgba(184,149,106,0.12);
}
.card-pergunta-topo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.pergunta-tag {
  font-size: 11px;
  color: var(--ouro-escuro);
  border: 1px solid var(--ouro);
  padding: 2px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.nav-perguntas { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  background: var(--bege);
  border: 1.5px solid #d4c4b0;
  color: var(--texto);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:active { background: #e8ddd0; }
.nav-idx { font-size: 12px; color: var(--texto-claro); }

.pergunta-titulo { font-size: 17px; font-weight: bold; color: var(--texto); line-height: 1.4; margin-bottom: 14px; }

/* ── OPÇÕES NO ADMIN ── */
.opcoes-admin { display: flex; flex-direction: column; gap: 7px; }
.opcao-admin {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.opcao-admin.a { background: #fdf0ef; border-color: #f0b8b2; }
.opcao-admin.b { background: #eef4fb; border-color: #a9c9e8; }
.opcao-admin.c { background: #fdf6e8; border-color: #e8c980; }
.opcao-admin.d { background: #eef8f2; border-color: #95d4ae; }
.opcao-admin.v { background: #eef8f2; border-color: #95d4ae; }
.opcao-admin.m { background: #fdf0ef; border-color: #f0b8b2; }
.opcao-admin.marcada-correta { outline: 3px solid #1e8449; outline-offset: 1px; }

.opcao-letra {
  font-size: 14px;
  font-weight: bold;
  min-width: 26px;
  text-align: center;
}
.opcao-admin.a .opcao-letra { color: var(--cor-a); }
.opcao-admin.b .opcao-letra { color: var(--cor-b); }
.opcao-admin.c .opcao-letra { color: var(--cor-c); }
.opcao-admin.d .opcao-letra { color: var(--cor-d); }
.opcao-admin.v .opcao-letra { color: var(--cor-v); }
.opcao-admin.m .opcao-letra { color: var(--cor-m); }

.opcao-texto { flex: 1; font-size: 14px; color: var(--texto); }
.opcao-contagem {
  font-size: 13px;
  font-weight: bold;
  color: var(--texto);
  background: var(--bege);
  border: 1px solid #d4c4b0;
  padding: 3px 10px;
  border-radius: 20px;
  min-width: 36px;
  text-align: center;
}
.nota-marcar {
  font-size: 12px;
  color: var(--texto-claro);
  font-style: italic;
  text-align: center;
  padding: 6px 0 0;
}

/* ── CONTADOR ── */
.contador-respostas {
  text-align: center;
  padding: 10px;
  background: white;
  border: 1.5px solid #e0d4c0;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--texto-claro);
  box-shadow: 0 2px 6px rgba(184,149,106,0.08);
}
.contador-respostas strong { color: var(--ouro); font-size: 20px; }

/* ── BOTÃO PRINCIPAL ── */
.btn-acao-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  border-top: 2px solid var(--ouro);
  padding: 12px 16px 16px;
  display: flex;
  gap: 8px;
  box-shadow: 0 -4px 16px rgba(184,149,106,0.15);
}
.btn-acao {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-family: 'Georgia', serif;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  color: white;
}
.btn-acao:active { transform: scale(0.97); filter: brightness(0.9); }
.btn-acao.enviar  { background: #2471a3; }
.btn-acao.fechar  { background: #6c3483; }
.btn-acao.revelar { background: #1e8449; }
.btn-acao.placar  { background: var(--ouro); }
.btn-acao.proxima { background: #2471a3; }
.btn-acao.desabilitado { background: #ccc; cursor: not-allowed; opacity: 0.6; }

.btn-reset-sala {
  background: var(--bege);
  border: 1.5px solid #d4c4b0;
  color: var(--texto-claro);
  padding: 16px 14px;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}
.btn-reset-sala:active { background: #fde8e8; border-color: #f0b8b2; }

/* ── PLACAR ADMIN ── */
#secao-placar { display: none; }
#secao-placar.visivel { display: block; }
.placar-item-admin {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: white;
  border-radius: 10px;
  margin-bottom: 8px;
  border-left: 4px solid var(--ouro);
  box-shadow: 0 2px 6px rgba(184,149,106,0.1);
}
.placar-pos { font-size: 20px; min-width: 30px; }
.placar-nome-admin { flex: 1; font-size: 15px; font-weight: bold; color: var(--texto); }
.placar-pts-admin { font-size: 18px; font-weight: bold; color: var(--ouro); }

/* ── AVISO ── */
.aviso {
  background: #fff8f0;
  border: 1.5px solid var(--ouro);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--ouro-escuro);
  margin-bottom: 14px;
  line-height: 1.5;
}
</style>
</head>

      { texto:'Todo mundo conversa sozinho em casa',         tipo:'vm', resp: null },
      { texto:'Dormir no sofá acontece',                     tipo:'vm', resp: null },
      { texto:'A cama vira escritório às vezes',             tipo:'vm', resp: null }
    ]
  }
];

// ── ESTADO LOCAL ──
let db, salaRef;
let blocoAtual = 0;
let pergAtual = 0;
let estadoSala = 'aguardando';
let totalJogadores = 0;
let respostasContagem = {};
let respostaManual = null; // índice marcado pelo admin quando resp=null

// ── INIT FIREBASE ──
firebase.initializeApp(firebaseConfig);
db = firebase.database();
salaRef = db.ref('sala');

// Escutar jogadores
db.ref('jogadores').on('value', snap => {
  totalJogadores = snap.numChildren();
  document.getElementById('jogadores-count').textContent = `${totalJogadores} jogador${totalJogadores !== 1 ? 'es' : ''} conectado${totalJogadores !== 1 ? 's' : ''}`;
});

// Escutar sala
salaRef.on('value', snap => {
  const sala = snap.val();
  if (!sala) return;
  estadoSala = sala.estado || 'aguardando';
  atualizarBadge();
  atualizarBotao();
});

// Escutar respostas da pergunta atual
function escutarRespostas() {
  const pergId = pergId_atual();
  respostasContagem = {};
  db.ref('respostas').orderByKey().startAt(pergId + '_').endAt(pergId + '_').on('value', snap => {
    respostasContagem = {};
    snap.forEach(child => {
      const r = child.val();
      const k = r.opcao;
      respostasContagem[k] = (respostasContagem[k] || 0) + 1;
    });
    atualizarContador();
    atualizarBarras();
  });
}

function pergId_atual() {
  return `${BLOCOS[blocoAtual].id}_${pergAtual}`;
}

// ── RENDER BLOCOS ──
function renderBlocos() {
  const wrap = document.getElementById('bloco-wrap');
  wrap.innerHTML = BLOCOS.map((b, i) =>
    `<button class="bloco-btn${i === blocoAtual ? ' ativo' : ''}" onclick="selecionarBloco(${i})">${b.nome}</button>`
  ).join('');
}

function selecionarBloco(i) {
  blocoAtual = i;
  pergAtual = 0;
  respostaManual = null;
  renderBlocos();
  renderPergunta();
}

// ── RENDER PERGUNTA ──
function renderPergunta() {
  const bloco = BLOCOS[blocoAtual];
  const p = bloco.perguntas[pergAtual];
  const total = bloco.perguntas.length;

  document.getElementById('p-tag').textContent = bloco.nome;
  document.getElementById('p-idx').textContent = `${pergAtual + 1}/${total}`;
  document.getElementById('p-titulo').textContent = p.texto;

  // Aviso gabarito
  const aviso = document.getElementById('aviso-gabarito');
  const nota = document.getElementById('nota-marcar');
  if (p.resp === null) {
    aviso.style.display = 'block';
    nota.style.display = 'block';
  } else {
    aviso.style.display = 'none';
    nota.style.display = 'none';
  }

  // Opções
  const container = document.getElementById('opcoes-admin');
  container.innerHTML = '';

  const correta = p.resp !== null ? p.resp : respostaManual;

  if (p.tipo === 'abc') {
    const letras = ['A','B','C'];
    const cls = ['a','b','c'];
    p.ops.forEach((op, i) => {
      container.appendChild(criarOpcaoAdmin(i, cls[i], letras[i], op, correta, p));
    });
  } else if (p.tipo === 'abcd') {
    const letras = ['A','B','C','D'];
    const cls = ['a','b','c','d'];
    p.ops.forEach((op, i) => {
      container.appendChild(criarOpcaoAdmin(i, cls[i], letras[i], op, correta, p));
    });
  } else if (p.tipo === 'vm') {
    container.appendChild(criarOpcaoAdmin(0, 'v', 'V', 'Verdade', correta, p));
    container.appendChild(criarOpcaoAdmin(1, 'm', 'M', 'Mentira', correta, p));
  }

  atualizarContador();
  escutarRespostas();
}

function criarOpcaoAdmin(i, cls, letra, texto, correta, p) {
  const div = document.createElement('div');
  div.className = 'opcao-admin ' + cls + (i === correta ? ' marcada-correta' : '');
  div.innerHTML = `
    <span class="opcao-letra">${letra})</span>
    <span class="opcao-texto">${texto}</span>
    <span class="opcao-contagem" id="cnt-${i}">0</span>
    <div class="opcao-barra-wrap" style="position:absolute;bottom:0;left:0;right:0;display:none;"></div>
  `;
  // Clique para marcar como correta (quando resp é null)
  if (p.resp === null) {
    div.style.cursor = 'pointer';
    div.onclick = () => marcarCorreta(i);
  }
  return div;
}

function marcarCorreta(i) {
  respostaManual = respostaManual === i ? null : i;
  renderPergunta();
}

// ── CONTADOR ──
function atualizarContador() {
  const total = Object.values(respostasContagem).reduce((a, b) => a + b, 0);
  document.getElementById('count-n').textContent = total;
  document.getElementById('count-t').textContent = totalJogadores;
  atualizarBarras();
}

function atualizarBarras() {
  const total = Object.values(respostasContagem).reduce((a, b) => a + b, 0);
  const p = BLOCOS[blocoAtual].perguntas[pergAtual];
  const numOps = p.tipo === 'vm' ? 2 : (p.tipo === 'abc' ? 3 : 4);
  for (let i = 0; i < numOps; i++) {
    const el = document.getElementById('cnt-' + i);
    if (el) el.textContent = respostasContagem[i] || 0;
  }
}

// ── BADGE ESTADO ──
const BADGE_CLASSES = {
  aguardando: ['estado-aguardando', 'Aguardando'],
  pergunta:   ['estado-pergunta',   'Respondendo'],
  fechado:    ['estado-fechado',    'Fechado'],
  revelado:   ['estado-revelado',   'Revelado'],
  placar:     ['estado-placar',     'Placar']
};
function atualizarBadge() {
  const badge = document.getElementById('estado-badge');
  badge.className = 'header-estado ' + (BADGE_CLASSES[estadoSala]?.[0] || 'estado-aguardando');
  badge.textContent = BADGE_CLASSES[estadoSala]?.[1] || estadoSala;
}

// ── BOTÃO PRINCIPAL ──
const BOTOES = {
  aguardando: { txt: '🚀 Enviar Pergunta',   cls: 'enviar',  fn: enviarPergunta },
  pergunta:   { txt: '🔒 Fechar Respostas',  cls: 'fechar',  fn: fecharRespostas },
  fechado:    { txt: '👁 Revelar Gabarito',  cls: 'revelar', fn: revelarGabarito },
  revelado:   { txt: '🏆 Ver Placar',        cls: 'placar',  fn: verPlacar },
  placar:     { txt: '➡️ Próxima Pergunta',  cls: 'proxima', fn: proximaPergunta }
};
function atualizarBotao() {
  const b = document.getElementById('btn-principal');
  const cfg = BOTOES[estadoSala] || BOTOES.aguardando;
  b.textContent = cfg.txt;
  b.className = 'btn-acao ' + cfg.cls;
  b.onclick = cfg.fn;
}

// ── AÇÕES ──
function acaoPrincipal() {
  (BOTOES[estadoSala]?.fn || enviarPergunta)();
}

function navegar(dir) {
  const bloco = BLOCOS[blocoAtual];
  const novo = pergAtual + dir;
  if (novo < 0 || novo >= bloco.perguntas.length) return;
  pergAtual = novo;
  respostaManual = null;
  renderPergunta();
}

function enviarPergunta() {
  const bloco = BLOCOS[blocoAtual];
  const p = bloco.perguntas[pergAtual];

  salaRef.set({
    estado: 'pergunta',
    perguntaId: pergId_atual(),
    pergunta: {
      bloco: bloco.nome,
      texto: p.texto,
      tipo: p.tipo,
      ops: p.ops || null,
      resp: p.resp
    }
  });
}

function fecharRespostas() {
  salaRef.update({ estado: 'fechado' });
}

async function revelarGabarito() {
  const p = BLOCOS[blocoAtual].perguntas[pergAtual];
  const correta = p.resp !== null ? p.resp : respostaManual;

  if (correta === null || correta === undefined) {
    alert('Marque qual é a resposta correta antes de revelar!');
    return;
  }

  // Calcular pontos: quem acertou +1
  const pergId = pergId_atual();
  const snap = await db.ref('respostas').orderByKey().startAt(pergId + '_').endAt(pergId + '_').get();
  const updates = {};

  snap.forEach(child => {
    const r = child.val();
    const uid = child.key.replace(pergId + '_', '');
    if (r.opcao == correta) {
      // Incrementar ponto
      updates[`jogadores/${uid}/pontos`] = firebase.database.ServerValue.increment(1);
    }
  });

  await db.ref().update(updates);
  salaRef.update({ estado: 'revelado', respostaCorreta: correta });
}

async function verPlacar() {
  salaRef.update({ estado: 'placar' });
  renderPlacarAdmin();
  document.getElementById('secao-placar').classList.add('visivel');
}

function renderPlacarAdmin() {
  db.ref('jogadores').orderByChild('pontos').get().then(snap => {
    const lista = [];
    snap.forEach(c => lista.push({ uid: c.key, ...c.val() }));
    lista.sort((a, b) => b.pontos - a.pontos);
    const medalhas = ['🥇','🥈','🥉'];
    document.getElementById('placar-lista-admin').innerHTML = lista.map((j, i) =>
      `<div class="placar-item-admin">
        <span class="placar-pos">${medalhas[i] || '#' + (i+1)}</span>
        <span class="placar-nome-admin">${j.nome}</span>
        <span class="placar-pts-admin">${j.pontos} pts</span>
      </div>`
    ).join('');
  });
}

function proximaPergunta() {
  document.getElementById('secao-placar').classList.remove('visivel');
  const bloco = BLOCOS[blocoAtual];
  if (pergAtual + 1 < bloco.perguntas.length) {
    pergAtual++;
  } else {
    // Acabou o bloco
    salaRef.update({ estado: 'aguardando' });
    return;
  }
  respostaManual = null;
  renderPergunta();
  salaRef.update({ estado: 'aguardando' });
}

function resetarSala() {
  if (!confirm('Resetar a sala? Todos os jogadores e pontos serão apagados.')) return;
  db.ref('/').set({ sala: { estado: 'aguardando' } });
  respostasContagem = {};
  respostaManual = null;
  renderPergunta();
}

// ── INIT ──
renderBlocos();
renderPergunta();
atualizarBadge();
atualizarBotao();
</script>
</body>
</html>
